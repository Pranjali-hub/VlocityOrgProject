<template>
    <lightning-card title="Picklist Value Demo">
        <div class="slds-m-around_medium">
            <lightning-combobox
            name="Industry"
            label="Industry"
            value={selectedIndustry}
            placeholder="Select Industry"
            options={industryOptions}
            onchange={handleChange} ></lightning-combobox>
        </div>
        <p class="slds-m-around_medium">Selected Industry: {selectedIndustry}</p>
    </lightning-card>
</template>
