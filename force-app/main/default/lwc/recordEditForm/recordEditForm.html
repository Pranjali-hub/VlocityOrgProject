<template>
    <lightning-card title="Record edit form">
        <lightning-record-edit-form
            object-api-name={objectApiName}>
            <lightning-messages></lightning-messages>
            <lightning-input-field field-name ={fields.nameField}></lightning-input-field>
            <lightning-input-field field-name ={fields.emailField}></lightning-input-field>
            <lightning-input-field field-name ={fields.phoneField}></lightning-input-field>
            <lightning-input-field field-name ={fields.titleField}></lightning-input-field>
            <lightning-input-field field-name ={fields.accountIdField}></lightning-input-field>
            <lightning-button label="Cancel" title="Non-primary action" class="slds-m-left_x-small" onclick={handleReset}></lightning-button>
            <lightning-button variant="success" label="Success" title="Successful action" class="slds-m-left_x-small"></lightning-button>
        </lightning-record-edit-form>
        </lightning-card>
</template>
