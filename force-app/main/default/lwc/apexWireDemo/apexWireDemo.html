<template>
    <lightning-card title="Apex wire demo">
        <lightning-combobox
            name="AccountType"
            label="AccountType"
            value={accType}
            placeholder="Select Account Type"
            options={accountTypeOptions}
            onchange={handleChange} >
        </lightning-combobox>

        <div class="slds-m-around_medium">
            <template if:true={accounts.data}>
                <template for:each={accounts.data} for:item="account">
                    <div key={account.Id} class="slds-m-vertical_small">
                        <p><strong>Account Name:</strong> {account.Name}</p>
                        <p><strong>Account Phone:</strong> {account.Phone}</p>
                        <p><strong>Account Industry:</strong> {account.Industry}</p>
                        <p><strong>Account Type:</strong> {account.Type}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
